# Browser: chromium | chrome | firefox | webkit | edge
browser=chromium

# Run headless (true) or with UI (false)
headless=false

# Slow down each action by N milliseconds (0 = off)
slowMo=1000

# Global timeout in milliseconds
timeout=30000

# Video recording: saves to test-output/videos/
recordVideo=false

# Tracing: saves zip on failure to test-output/traces/
enableTracing=false

# Storage state: path to saved auth session (leave blank to disable)
storageState=

# Base URL (page objects navigate themselves — this is used by BrowserFactory default)
url=https://dot-log-pi.vercel.app/labs/end-to-end/ecommerce
